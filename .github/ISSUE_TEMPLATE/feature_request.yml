name: Feature Request
description: Suggest an enhancement or new feature
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature or enhancement.
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: Proposed API
      description: If you have ideas for the API surface, sketch it out.
      placeholder: |
        ```swift
        // Example usage
        ```

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - AICore
        - AIProviderOpenAI
        - AIProviderAnthropic
        - AISwiftUI
        - New Provider
        - Other
    validations:
      required: true
