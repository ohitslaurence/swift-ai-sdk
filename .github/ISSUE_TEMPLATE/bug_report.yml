name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to report a bug.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```swift
        let provider = OpenAIProvider(apiKey: "...")
        // ...
        ```
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened. Include error messages if applicable.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: SDK Version
      placeholder: "0.1.4"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - OpenAI
        - Anthropic
        - Both
        - N/A
    validations:
      required: true

  - type: input
    id: swift-version
    attributes:
      label: Swift Version
      placeholder: "6.0"

  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "macOS 15, iOS 18, etc."
